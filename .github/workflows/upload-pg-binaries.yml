name: Upload PG Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-macos:
    runs-on: macos-latest
    steps:
      - name: Install PostgreSQL via Homebrew
        run: brew install postgresql@17

      - name: Package
        run: |
          PG_PREFIX=$(brew --prefix postgresql@17)
          mkdir -p pgsql
          cp -RH "$PG_PREFIX"/* pgsql/

          # Homebrew PG links against external dylibs (icu4c, openssl, zstd,
          # lz4, krb5, readline, gettext). Copy them into pgsql/lib/ so the
          # bundle is self-contained on machines without Homebrew.
          DEPS=(
            "$(brew --prefix icu4c@78)/lib/libicui18n.78.dylib"
            "$(brew --prefix icu4c@78)/lib/libicuuc.78.dylib"
            "$(brew --prefix icu4c@78)/lib/libicudata.78.dylib"
            "$(brew --prefix openssl@3)/lib/libssl.3.dylib"
            "$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            "$(brew --prefix zstd)/lib/libzstd.1.dylib"
            "$(brew --prefix lz4)/lib/liblz4.1.dylib"
            "$(brew --prefix krb5)/lib/libgssapi_krb5.2.2.dylib"
            "$(brew --prefix krb5)/lib/libkrb5.3.3.dylib"
            "$(brew --prefix krb5)/lib/libk5crypto.3.1.dylib"
            "$(brew --prefix krb5)/lib/libkrb5support.0.1.dylib"
            "$(brew --prefix krb5)/lib/libkrb5support.1.1.dylib"
            "$(brew --prefix krb5)/lib/libcom_err.3.0.dylib"
            "$(brew --prefix readline)/lib/libreadline.8.dylib"
            "$(brew --prefix gettext)/lib/libintl.8.dylib"
          )
          for dep in "${DEPS[@]}"; do
            [ -f "$dep" ] && cp -H "$dep" pgsql/lib/ && echo "copied $dep"
          done

          # Diagnostic: show unrewritten deps before rewrite
          echo "=== Pre-rewrite: initdb deps ==="
          otool -L pgsql/bin/initdb 2>/dev/null || true

          # Rewrite dylib paths in ALL binaries (use -perm +111 for BSD find)
          find pgsql/bin -type f -perm +111 -exec sh -c '
            for binpath; do
              otool -L "$binpath" 2>/dev/null | awk "NR>1{print \$1}" | while read dep; do
                case "$dep" in @*|/usr/lib/*|/System/*) continue;; esac
                libname=$(basename "$dep")
                if [ -f "pgsql/lib/$libname" ]; then
                  install_name_tool -change "$dep" "@loader_path/../lib/$libname" "$binpath"
                elif [ -f "pgsql/lib/postgresql/$libname" ]; then
                  install_name_tool -change "$dep" "@loader_path/../lib/postgresql/$libname" "$binpath"
                fi
              done
            done
          ' _ {} +

          # Rewrite dylib paths in lib/*.dylib (top-level)
          find pgsql/lib -maxdepth 1 -name '*.dylib' -exec sh -c '
            for libpath; do
              libfile=$(basename "$libpath")
              install_name_tool -id "@loader_path/$libfile" "$libpath" 2>/dev/null || true
              otool -L "$libpath" 2>/dev/null | awk "NR>1{print \$1}" | while read dep; do
                case "$dep" in @*|/usr/lib/*|/System/*) continue;; esac
                depname=$(basename "$dep")
                if [ -f "pgsql/lib/$depname" ]; then
                  install_name_tool -change "$dep" "@loader_path/$depname" "$libpath"
                fi
              done
            done
          ' _ {} +

          # Rewrite dylib paths in lib/postgresql/ — refs to lib/ need ../
          find pgsql/lib/postgresql -type f \( -name '*.dylib' -o -perm +111 \) -exec sh -c '
            for libpath; do
              libfile=$(basename "$libpath")
              install_name_tool -id "@loader_path/$libfile" "$libpath" 2>/dev/null || true
              otool -L "$libpath" 2>/dev/null | awk "NR>1{print \$1}" | while read dep; do
                case "$dep" in @*|/usr/lib/*|/System/*) continue;; esac
                depname=$(basename "$dep")
                if [ -f "pgsql/lib/postgresql/$depname" ]; then
                  install_name_tool -change "$dep" "@loader_path/$depname" "$libpath"
                elif [ -f "pgsql/lib/$depname" ]; then
                  install_name_tool -change "$dep" "@loader_path/../$depname" "$libpath"
                fi
              done
            done
          ' _ {} +

          # Diagnostic: show deps after rewrite
          echo "=== Post-rewrite: initdb deps ==="
          otool -L pgsql/bin/initdb 2>/dev/null || true

          # Verify no absolute Homebrew/Cellar paths remain
          if otool -L pgsql/bin/initdb 2>/dev/null | grep -q '/opt/homebrew\|/usr/local/Cellar'; then
            echo "::error::initdb still has absolute Homebrew paths after rewrite!"
            otool -L pgsql/bin/initdb
            exit 1
          fi

          # Re-codesign after modifying
          find pgsql/bin pgsql/lib -type f \( -perm +111 -o -name '*.dylib' \) -exec codesign -s - --force {} \; 2>/dev/null || true

          tar czf pg-17-darwin-arm64.tar.gz pgsql

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-darwin-arm64.tar.gz --clobber --repo ${{ github.repository }}

  upload-windows:
    runs-on: windows-latest
    steps:
      - name: Install PostgreSQL via Chocolatey
        shell: pwsh
        run: choco install postgresql17 --params '/Password:postgres' -y --no-progress

      - name: Package
        shell: bash
        run: |
          mkdir -p pgsql
          cp -R "/c/Program Files/PostgreSQL/17/bin" pgsql/
          cp -R "/c/Program Files/PostgreSQL/17/lib" pgsql/
          cp -R "/c/Program Files/PostgreSQL/17/share" pgsql/
          7z a pg-17-windows-x64.zip pgsql

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-windows-x64.zip --clobber --repo ${{ github.repository }}

  upload-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL via apt
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17

      - name: Package
        run: |
          mkdir -p pgsql
          cp -R /usr/lib/postgresql/17/* pgsql/
          tar czf pg-17-linux-x64.tar.gz pgsql

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-linux-x64.tar.gz --clobber --repo ${{ github.repository }}
