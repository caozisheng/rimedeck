name: Upload PG Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build a RELOCATABLE PostgreSQL bundle from EDB's prebuilt osx-arm64
      # binaries using the same script the desktop dev/build flow already uses
      # (apps/desktop/scripts/bundle-pg.mjs). The script downloads the archive,
      # rewrites dylib load paths to @executable_path-relative, and ad-hoc
      # codesigns. EDB binaries use a single install prefix
      # (bindir=<p>/bin, sharedir=<p>/share, FLAT share/ with postgres.bki),
      # so PostgreSQL's exec-relative path resolution (src/port/path.c
      # make_relative_path) finds share/ next to the bundled bin/ at runtime.
      #
      # Homebrew's postgresql@17 was previously used here but is fundamentally
      # non-relocatable: it compiles PGSHAREDIR=$HOMEBREW_PREFIX/share/postgresql@17
      # (an "opt" path) while PGBINDIR resolves under .../Cellar/<ver>/bin. The two
      # share only the trivial /opt/homebrew/ prefix, so make_relative_path() can
      # never relocate a flat <bundle>/bin layout and falls back to the absolute
      # compiled path — which does not exist on a user's Mac. It also physically
      # installs share files under share/postgresql/ (unversioned), so the runtime
      # `initdb -L <bundle>/share` could not find postgres.bki. Both broke launch.
      - name: Build relocatable PG bundle (EDB osx-arm64)
        run: node apps/desktop/scripts/bundle-pg.mjs --target-platform darwin --target-arch arm64 --force

      - name: Verify bundle layout + relocatability
        run: |
          PG=apps/desktop/resources/pgsql
          # initdb reads bootstrap files from <bin>/../share — postgres.bki MUST be there.
          if [ ! -f "$PG/share/postgres.bki" ]; then
            echo "::error::postgres.bki missing from $PG/share — initdb would fail at runtime"
            ls -la "$PG/share" 2>/dev/null || true
            exit 1
          fi
          # No absolute build-host paths may survive in the shipped binaries.
          BAD=0
          for b in initdb postgres pg_ctl createdb psql pg_isready; do
            bin="$PG/bin/$b"
            [ -f "$bin" ] || continue
            if otool -L "$bin" | grep -E '/opt/homebrew|/usr/local|/Library/PostgreSQL'; then
              echo "::error::$b retains absolute dylib paths after rewrite"
              BAD=1
            fi
          done
          [ "$BAD" = 0 ] || exit 1
          echo "Bundle OK — bin: $(ls "$PG/bin" | tr '\n' ' ')"

      - name: Package
        run: |
          cd apps/desktop/resources
          tar czf "$GITHUB_WORKSPACE/pg-17-darwin-arm64.tar.gz" pgsql

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-darwin-arm64.tar.gz --clobber --repo ${{ github.repository }}

  upload-windows:
    runs-on: windows-latest
    steps:
      - name: Install PostgreSQL via Chocolatey
        shell: pwsh
        run: choco install postgresql17 --params '/Password:postgres' -y --no-progress

      - name: Package
        shell: bash
        run: |
          mkdir -p pgsql
          cp -R "/c/Program Files/PostgreSQL/17/bin" pgsql/
          cp -R "/c/Program Files/PostgreSQL/17/lib" pgsql/
          cp -R "/c/Program Files/PostgreSQL/17/share" pgsql/
          7z a pg-17-windows-x64.zip pgsql

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-windows-x64.zip --clobber --repo ${{ github.repository }}

  upload-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL via apt
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17

      - name: Package
        run: |
          mkdir -p pgsql
          cp -R /usr/lib/postgresql/17/* pgsql/
          tar czf pg-17-linux-x64.tar.gz pgsql

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload pg-binaries pg-17-linux-x64.tar.gz --clobber --repo ${{ github.repository }}
