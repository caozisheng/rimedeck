name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PG_RELEASE_TAG: pg-binaries

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-darwin-arm64.tar.gz" --repo ${{ github.repository }}
          tar xzf pg-17-darwin-arm64.tar.gz
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-darwin-arm64.tar.gz

      - name: Package Desktop (macOS arm64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/package.mjs --mac --arm64 --publish always

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-windows-x64.zip" --repo ${{ github.repository }}
          unzip -qo pg-17-windows-x64.zip
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-windows-x64.zip

      - name: Package Desktop (Windows x64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/package.mjs --win --x64 --publish always

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-linux-x64.tar.gz" --repo ${{ github.repository }}
          tar xzf pg-17-linux-x64.tar.gz
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-linux-x64.tar.gz

      - name: Package Desktop (Linux x64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/package.mjs --linux --x64 --publish always
